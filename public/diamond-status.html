<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaSalle Titans Diamond Status</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-nav="status">
  <div class="topbar">
    <div class="wrap topbar-inner">
      <a id="homeNavLink" class="topbar-link" data-nav-key="home" href="/">Log in</a>
      <a class="topbar-link" data-nav-key="availability" href="/availability.html">Diamond Availability</a>
      <a class="topbar-link" data-nav-key="status" href="/diamond-status.html">Diamond Status</a>
      <a class="topbar-link" data-nav-key="contact" href="/contact.html">Contact</a>
      <a id="adminLink" class="topbar-link" data-nav-key="admin" href="/admin.html" hidden>Admin approval</a>
      <a id="fieldStatusLink" class="topbar-link" data-nav-key="field-status" href="/diamond-status-admin.html" hidden>Field Status Control</a>
    </div>
  </div>

  <header class="masthead">
    <div class="wrap masthead-inner">
      <div>
        <p class="eyebrow">LaSalle Titans</p>
        <h1>Diamond Status</h1>
      </div>
    </div>
  </header>

  <main class="wrap app-shell">
    <section class="status-strip" aria-label="Diamond status summary">
      <div>
        <strong id="statusOpenCount">0</strong>
        <span>open statuses</span>
      </div>
      <div>
        <strong id="statusClosedCount">0</strong>
        <span>closed statuses</span>
      </div>
      <div>
        <strong id="statusUpdatedAt">--</strong>
        <span>last live check</span>
      </div>
    </section>

    <section class="schedule-section contact-section">
      <div class="section-head">
        <h2>Current Field Conditions</h2>
        <span id="diamondStatusMeta">Live from Turtle Club status.</span>
      </div>
      <div id="diamondStatusList" class="diamond-status-list">
        <p class="muted">Loading status...</p>
      </div>
    </section>
  </main>

  <script src="nav.js"></script>
  <script src="diamond-status.js"></script>
</body>
</html>
